version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: broker-pm-backend
    working_dir: /app
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: sqlite:///./data/broker_pm_local.db
    ports:
      - "8000:8000"

  scheduler:
    build:
      context: ./backend
    container_name: broker-pm-scheduler
    working_dir: /app
    command: ["python", "-m", "app.scheduler"]
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
    environment:
      PYTHONUNBUFFERED: "1"
      DATABASE_URL: sqlite:///./data/broker_pm_local.db

  frontend:
    build:
      context: ./frontend
    container_name: broker-pm-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
